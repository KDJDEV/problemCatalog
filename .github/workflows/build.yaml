name: Build PDF

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: xu-cheng/latex-action@v4
        with:
          root_file: catalog.tex

      - uses: actions/upload-artifact@v4
        with:
          name: pdf
          path: catalog.pdf